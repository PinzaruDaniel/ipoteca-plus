<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalii proprietate — IPOTECA PLUS SRL</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V21H3V9.5zm2 1.17V19h14v-8.33L12 5.34 5 10.67z"/></svg></div>
      <div class="nav-logo-text"><span class="nav-logo-name">IPOTECA PLUS</span><span class="nav-logo-sub">Agenție Imobiliară</span></div>
    </a>
    <ul class="nav-links">
      <li><a href="/">Acasă</a></li>
      <li><a href="/properties.html">Proprietăți</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="navHamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div id="pageContent" style="padding-top:76px">
  <div class="container" style="padding:40px 24px">
    <div class="loading-state"><div class="spinner"></div><p>Se încarcă...</p></div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2025 <span style="color:var(--gold)">IPOTECA PLUS SRL</span>.</span>
      <a href="/properties.html" style="color:rgba(255,255,255,.5);font-size:.82rem">← Înapoi la proprietăți</a>
    </div>
  </div>
</footer>

<script src="/js/main.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const propId = urlParams.get('id');

  async function loadProperty() {
    const content = document.getElementById('pageContent');
    if (!propId) {
      content.innerHTML = '<div class="not-found"><h2>ID invalid</h2><a href="/properties.html" class="btn btn-dark">← Proprietăți</a></div>';
      return;
    }
    try {
      const res = await fetch(`/api/properties/${propId}`);
      if (!res.ok) throw new Error('Not found');
      const p = await res.json();
      document.title = `${p.title} — IPOTECA PLUS`;
      renderProperty(p, content);
    } catch(e) {
      content.innerHTML = `
      <div class="not-found">
        <h1>404</h1>
        <h2>Proprietate negăsită</h2>
        <p>Proprietatea solicitată nu există sau nu mai este disponibilă.</p>
        <a href="/properties.html" class="btn btn-dark">← Înapoi la proprietăți</a>
      </div>`;
    }
  }

  function renderProperty(p, el) {
    const typeLabels = { apartament:'Apartament', casa:'Casă / Vilă', teren:'Teren', comercial:'Comercial', birou:'Birou' };
    const featuresHtml = p.features && p.features.length
            ? p.features.map(f => `<span class="prop-feature-tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>${f}</span>`).join('')
            : '';

    el.innerHTML = `
    <div style="background:var(--cream);padding-top:0">
      <div class="container" style="padding:28px 24px 0">
        <div class="breadcrumb" style="color:var(--gray-400)">
          <a href="/" style="color:var(--gray-400)">Acasă</a><span>›</span>
          <a href="/properties.html" style="color:var(--gray-400)">Proprietăți</a><span>›</span>
          <span style="color:var(--text)">${p.title}</span>
        </div>
      </div>
    </div>
    <div class="container" style="padding:32px 24px 80px">
      <div class="prop-detail-grid">
        <div>
          <!-- Gallery -->
          <div class="prop-gallery">
            ${p.images && p.images.length
            ? `<img src="${p.images[0].image_url}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover" />`
            : (p.main_image || p.image_url)
            ? `<img src="${p.main_image || p.image_url}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover" />`
            : `<div class="prop-gallery-placeholder">🏠</div>`
    }
          </div>
          ${p.images && p.images.length > 1 ? `
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:32px">
            ${p.images.slice(1,5).map(img => `
              <div style="height:100px;border-radius:10px;overflow:hidden;background:var(--gray-100)">
                <img src="${img.image_url}" style="width:100%;height:100%;object-fit:cover" />
              </div>
            `).join('')}
          </div>` : ''}

          <!-- Details -->
          <h1 style="font-size:1.8rem;color:var(--navy);margin-bottom:16px">${p.title}</h1>
          <div class="prop-location" style="margin-bottom:20px;font-size:.95rem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${[p.address, p.zone, p.city].filter(Boolean).join(', ')}
          </div>

          <div class="prop-detail-meta">
            ${p.type ? `<div class="prop-detail-meta-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><strong>${typeLabels[p.type]||p.type}</strong></div>` : ''}
            ${p.surface_m2 ? `<div class="prop-detail-meta-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><strong>${p.surface_m2} m²</strong></div>` : ''}
            ${p.rooms ? `<div class="prop-detail-meta-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><strong>${p.rooms} camere</strong></div>` : ''}
            ${p.bathrooms ? `<div class="prop-detail-meta-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6z"/></svg><strong>${p.bathrooms} băi</strong></div>` : ''}
            ${p.floor != null ? `<div class="prop-detail-meta-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg><strong>Etaj ${p.floor}${p.total_floors ? '/'+p.total_floors : ''}</strong></div>` : ''}
            ${p.year_built ? `<div class="prop-detail-meta-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><strong>An: ${p.year_built}</strong></div>` : ''}
          </div>

          ${p.description ? `
          <div style="margin-bottom:28px">
            <h3 style="font-size:1.1rem;color:var(--navy);margin-bottom:12px">Descriere</h3>
            <p style="color:var(--gray-700);line-height:1.8">${p.description}</p>
          </div>` : ''}

          ${featuresHtml ? `
          <div>
            <h3 style="font-size:1.1rem;color:var(--navy);margin-bottom:14px">Facilități</h3>
            <div class="prop-features">${featuresHtml}</div>
          </div>` : ''}
        </div>

        <!-- Contact card -->
        <div>
          <div class="contact-card">
            <div class="prop-price">${formatPrice(p.price, p.currency)}</div>
            ${p.agent_name ? `
            <div class="agent-info">
              <div class="agent-avatar" style="width:44px;height:44px;font-size:1rem">${p.agent_name.split(' ').map(x=>x[0]).join('').slice(0,2)}</div>
              <div>
                <div style="font-weight:600;color:var(--navy);font-size:.9rem">${p.agent_name}</div>
                <div style="font-size:.8rem;color:var(--gray-400)">Agent imobiliar</div>
                ${p.agent_phone ? `<div style="font-size:.82rem;color:var(--gold);margin-top:2px">${p.agent_phone}</div>` : ''}
              </div>
            </div>` : ''}
            <div id="inquiryAlert"></div>
            <div class="form-group"><label>Nume *</label><input type="text" class="form-control" id="iName" placeholder="Numele dvs." /></div>
            <div class="form-group"><label>Telefon</label><input type="tel" class="form-control" id="iPhone" placeholder="+373 69 XXX XXX" /></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control" id="iEmail" placeholder="email@exemplu.com" /></div>
            <div class="form-group"><label>Mesaj</label><textarea class="form-control" id="iMessage" style="min-height:90px" placeholder="Sunt interesat de această proprietate..."></textarea></div>
            <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="sendInquiry()">Trimite cerere</button>
            ${p.agent_phone ? `
            <a href="tel:${p.agent_phone}" class="btn btn-dark" style="width:100%;justify-content:center;margin-top:10px">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
              Apelați agentul
            </a>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }

  async function sendInquiry() {
    const name = document.getElementById('iName').value.trim();
    const phone = document.getElementById('iPhone').value.trim();
    const email = document.getElementById('iEmail').value.trim();
    const message = document.getElementById('iMessage').value.trim();
    const alertEl = document.getElementById('inquiryAlert');
    if (!name || (!phone && !email)) {
      alertEl.innerHTML = '<div class="alert alert-error">Completați numele și cel puțin un contact.</div>';
      return;
    }
    try {
      const res = await fetch(`/api/properties/${propId}/inquiry`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ full_name: name, phone, email, message })
      });
      const json = await res.json();
      if (json.success) {
        alertEl.innerHTML = '<div class="alert alert-success">✓ Cererea a fost trimisă! Vă vom contacta în curând.</div>';
      } else {
        alertEl.innerHTML = `<div class="alert alert-error">${json.error}</div>`;
      }
    } catch(e) {
      alertEl.innerHTML = '<div class="alert alert-error">Eroare de rețea.</div>';
    }
  }

  loadProperty();
</script>
</body>
</html>
